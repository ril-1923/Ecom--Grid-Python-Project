{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Partner Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 CSS -->
    <link href="{% static 'ecom/css/bootstrap.min.css' %}" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f6f9;
        }

        /* Sidebar */
        .sidebar {
            width: 250px;
            min-height: 100vh;
            background: #212529;
            position: fixed;
            top: 56px;
            left: 0;
            padding-top: 20px;
        }

        .sidebar a {
            color: #adb5bd;
            padding: 12px 20px;
            display: block;
            text-decoration: none;
            transition: 0.3s;
        }

        .sidebar a:hover, .sidebar a.active {
            background: #0d6efd;
            color: #fff;
        }

        /* Main Content */
        .content {
            margin-left: 250px;
            padding: 20px;
            margin-top: 56px;
        }

        /* Cards */
        .card-box {
            border-radius: 10px;
            color: #fff;
        }

        .bg-blue { background: #0d6efd; }
        .bg-green { background: #198754; }
        .bg-orange { background: #fd7e14; }
        .bg-red { background: #dc3545; }

        @media(max-width: 768px) {
            .sidebar {
                left: -250px;
            }
            .sidebar.show {
                left: 0;
            }
            .content {
                margin-left: 0;
            }
        }
    </style>
</head>

<body>

<!-- Top Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
    <div class="container-fluid">
        <button class="btn btn-outline-light d-lg-none" id="menuToggle">
            <i class="bi bi-list"></i>
        </button>
        <a class="navbar-brand ms-2" href="#">Admin Panel</a>

        <div class="dropdown ms-auto">
            <a class="d-flex align-items-center text-white text-decoration-none dropdown-toggle"
            href="#" id="userDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">

                <img src="https://via.placeholder.com/40" 
                    alt="profile" width="40" height="40" 
                    class="rounded-circle me-2">

                <strong>{{ request.session.PartnerName }}</strong>
            </a>

            <ul class="dropdown-menu dropdown-menu-end text-small shadow" aria-labelledby="userDropdown">
                <li><a class="dropdown-item" href="#"><i class="bi bi-person me-2"></i>Profile</a></li>
                <li><a class="dropdown-item" href="#"><i class="bi bi-gear me-2"></i>Settings</a></li>
                <li><hr class="dropdown-divider"></li>
                <li><a class="dropdown-item text-danger" href="/Partner-Logout/"><i class="bi bi-box-arrow-right me-2"></i>Logout</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- Sidebar -->
<div class="sidebar" id="sidebar">
    <a href="#" class="active"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a>
    <a href="#"><i class="bi bi-people me-2"></i> Users</a>

    <!-- Products Dropdown -->
    <a class="d-flex justify-content-between align-items-center" data-bs-toggle="collapse" href="#productMenu" role="button" aria-expanded="false">
        <span><i class="bi bi-box me-2"></i> Products</span>
        <i class="bi bi-chevron-down small"></i>
    </a>
    <div class="collapse ps-4" id="productMenu">
        <a href="/Add-Product/" class="py-1 d-block"><i class="bi bi-plus-circle me-2"></i> Add Product</a>
        <a href="/Product-List/" class="py-1 d-block"><i class="bi bi-list-ul me-2"></i> Product List</a>
    </div>

    <a href="#"><i class="bi bi-cart me-2"></i> Orders</a>
    <a href="#"><i class="bi bi-bar-chart me-2"></i> Reports</a>
    <a href="#"><i class="bi bi-gear me-2"></i> Settings</a>
    <a href="#"><i class="bi bi-box-arrow-right me-2"></i> Logout</a>
</div>

<!-- Main Content -->
<div class="content">
    <div class="container-fluid">
        <div class="row mb-4">
            <div class="col-12">
                <h4 class="fw-bold">Add New Product</h4>
                <hr>
            </div>
        </div>

        <div class="row">
            <div class="col-lg-8">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <form method="POST" action="" enctype="multipart/form-data">
                            {% csrf_token %}

                            <!-- Product Name -->
                            <div class="mb-3">
                                <label class="form-label">Product Name</label>
                                <input type="text" name="product_name" class="form-control" placeholder="Enter product name" required>
                            </div>

                            <!-- Product Description -->
                            <div class="mb-3">
                                <label class="form-label">Product Description</label>
                                <textarea name="product_description" class="form-control" rows="4" placeholder="Enter product description" required></textarea>
                            </div>

                            <!-- Price & Quantity -->
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Product Price (₹)</label>
                                    <input type="number" step="0.01" name="product_price" class="form-control" placeholder="Enter price" required>
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Product Quantity</label>
                                    <input type="number" name="product_quantity" class="form-control" placeholder="Enter quantity" required>
                                </div>
                            </div>

                            <!-- Product Image -->
                            <div class="mb-3">
                                <label class="form-label">Product Cover Image</label>
                                <input type="file" name="product_cover_image" class="form-control" required>
                            </div>

                            <!-- Buttons -->
                            <div class="d-flex justify-content-end">
                                <button type="reset" class="btn btn-secondary me-2">
                                    <i class="bi bi-x-circle"></i> Clear
                                </button>
                                <button type="submit" class="btn btn-primary">
                                    <i class="bi bi-check-circle"></i> Save Product
                                </button>
                            </div>

                        </form>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>


<!-- Bootstrap JS -->
<script src="{% static 'ecom/js/bootstrap.bundle.min.js' %}"></script>

<script>
    document.getElementById("menuToggle").addEventListener("click", function(){
        document.getElementById("sidebar").classList.toggle("show");
    });
</script>

</body>
</html>
