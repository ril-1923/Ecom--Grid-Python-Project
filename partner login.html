{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Seller Login</title>
    <link href="{% static 'ecom/css/bootstrap.min.css' %}" rel="stylesheet">
    <link href="{% static 'ecom/css/partner.css' %}" rel="stylesheet" type="text/css">
</head>
<body>

<div class="login-box card p-4 shadow">
    <h3 class="text-center mb-3">Seller Login</h3>

    <form method="POST" action="">
    {% csrf_token %}
        <div class="mb-3">
            <label>Email</label>
            <input type="email" name="username" class="form-control" placeholder="Enter email">
        </div>

        <div class="mb-3">
            <label>Password</label>
            <input type="password" name="password" class="form-control" placeholder="Enter password">
        </div>

        <button class="btn btn-primary w-100">Login</button>
    </form>
        {% if error %}
            <div class="alert alert-danger mt-3">{{ error }}</div>
        {% endif %}
</div>
<script src="{% static 'ecom/js/bootstrap.bundle.min.js' %}" type="text/javascript"></script>
</body>
</html>
