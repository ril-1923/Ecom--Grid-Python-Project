{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Customer Registration</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 CDN -->
    <link href="{% static 'ecom/css/bootstrap.min.css' %}" rel="stylesheet">
    <link href="{% static 'ecom/css/style.css' %}" rel="stylesheet" type="text/css">

    <style>
        body{
            background:#f2f4f7;
        }
        .register-box{
            max-width:450px;
            margin:auto;
            margin-top:80px;
            padding:30px;
            background:white;
            border-radius:10px;
            box-shadow:0 0 15px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="index.html">E-Shop</a>

    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav ms-auto">

        <li class="nav-item">
          <a class="nav-link active" href="#">Home</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="#">Contact</a>
        </li>

        <!-- Register Dropdown -->
        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle" href="#" id="registerDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
            Register
          </a>
          <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="registerDropdown">
            <li><a class="dropdown-item" href="/Customer-Register/">Customer</a></li>
            <li><a class="dropdown-item" href="/Partner-Register/">Partner</a></li>
          </ul>
        </li>

      </ul>
    </div>
  </div>
</nav>

<div class="container my-2">
    <div class="register-box">
        <h3 class="text-center mb-4">Customer Registration</h3>

        <form method="POST" action="">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" name="customer_name" class="form-control" placeholder="Enter your name" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <input type="email" name="customer_email" class="form-control" placeholder="Enter your email" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Mobile Number</label>
                <input type="text" name="customer_mobile" class="form-control" placeholder="Enter mobile number" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="customer_password" class="form-control" placeholder="Enter password" required>
            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-primary">Register</button>
            </div>
        </form> 
        {% if error %}
            <div class="alert alert-danger mt-3">{{ error }}</div>
        {% endif %}

        {% if success %}
            <div class="alert alert-success mt-3">{{ success }}</div>
        {% endif %}   

            <div class="text-center mt-3">
                Already have an account? <a href="#">Login</a>
            </div>
    </div>
</div>

<!-- Footer -->
<footer class="bg-dark text-white text-center p-3">
  © 2025 E-Shop. All Rights Reserved.
</footer>

<script src="{% static 'ecom/js/bootstrap.bundle.min.js' %}" type="text/javascript"></script>
</body>
</html>
